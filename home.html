<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="musicPlayer.css">
    <link rel="stylesheet" href="content.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="navbar.css">
</head>

<body>
    <section class="main">
        <div class="navbar">
            <div class="left">
                <div class="brandLogo"></div>
                <div class="navigate">
                    <div class="previous"><svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"
                            viewBox="0 0 24 24" id="prev-btn" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-chevron-left-icon lucide-chevron-left">
                            <path d="m15 18-6-6 6-6" />
                        </svg></div>
                    <div class="next"><svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24"
                            fill="none" id="next-btn" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" class="lucide lucide-chevron-right-icon lucide-chevron-right">
                            <path d="m9 18 6-6-6-6" />
                        </svg></div>
                </div>
            </div>
            <div class="middle">
                <div class="homeButton">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" id="home-btn"
                        class="size-6">
                        <path
                            d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z" />
                        <path
                            d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z" />
                    </svg>
                </div>
                <div class="searchBar">
                    <div class="searchIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" id="search-icon" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-search-icon lucide-search">
                            <path d="m21 21-4.34-4.34" />
                            <circle cx="11" cy="11" r="8" />
                        </svg></div>
                    <input class="search" placeholder="What do you want to play?mm"></input>
                    <div class="explore">
                        <div class="line"></div>
                        <div class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" id="explore-btn" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                class="lucide lucide-library-icon lucide-library">
                                <path d="m16 6 4 14" />
                                <path d="M12 6v14" />
                                <path d="M8 8v12" />
                                <path d="M4 4v16" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right">
                <div class="theme">
                    <div class="themeIcon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" id="theme-icon"
                            xmlns="http://www.w3.org/2000/svg">

                            <path d="M21 12.8A9 9 0 1 1 11.2 3 
           7 7 0 0 0 21 12.8Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                                stroke-linejoin="round" />

                        </svg></div>
                    <div class="themeName">Dark</div>
                </div>
                <div class="profile">
                    <div class="picture">
                        <img src="/assets/profilePicture.jpeg">
                    </div>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="playlist">
                <div class="playlistHead">
                    <div class="top">
                        <div class="yourLibrary">Your Library</div>
                        <div class="create">
                            <div class="createIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" id="add-btn" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round"
                                    class="lucide lucide-plus-icon lucide-plus">
                                    <path d="M5 12h14" />
                                    <path d="M12 5v14" />
                                </svg></div>
                            <div class="createText">Create</div>
                        </div>
                    </div>
                    <div class="bottom">
                        <div class="playlists pb">Playlists</div>
                        <div class="podcasts pb">Podcasts</div>
                        <div class="albums pb">albums</div>
                        <div class="artists pb">artists</div>
                    </div>
                </div>
                <div class="playlistBody">
                    <div class="playlistNavigate">
                        <div class="playlistSearch"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" id="search-icon-playlist" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                class="lucide lucide-search-icon lucide-search">
                                <path d="m21 21-4.34-4.34" />
                                <circle cx="11" cy="11" r="8" />
                            </svg></div>
                        <div class="playlistRecents">
                            <div class="recentText">Recents</div>
                            <div class="recentIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" id="playlistRecent-btn" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    class="lucide lucide-menu-icon lucide-menu">
                                    <path d="M4 5h16" />
                                    <path d="M4 12h16" />
                                    <path d="M4 19h16" />
                                </svg></div>
                        </div>
                    </div>
                    <div class="playlistItem">
                        <div class="playlistProfile"></div>
                        <div class="playlistDescription"></div>
                    </div>
                </div>
            </div>
            <div class="contetDisplay"></div>
            <div class="queue"></div>
        </div>
        <div class="musicPlayer">
            <div class="musicInfo">
                <div class="songCover">
                    <div class="songCoverLayout">
                        <img src="/assets/sampleSongCover.jpg">
                    </div>
                </div>
                <div class="songDescription">
                    <div class="songName">Brutal</div>
                    <div class="songArtist">Olivia Rodrigo</div>
                </div>
            </div>
            <div class="mainPlayer">
                <div class="songFunctions">
                    <div class="previous nav"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="navigate-btn lucide lucide-skip-back-icon lucide-skip-back">
                            <path
                                d="M17.971 4.285A2 2 0 0 1 21 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z" />
                            <path d="M3 20V4" />
                        </svg></div>
                    <div class="play"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                            fill="currentColor" id="play-btn" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" class="lucide lucide-play-icon lucide-play">
                            <path
                                d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
                        </svg></div>
                    <div class="next nav"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="navigate-btn lucide lucide-skip-forward-icon lucide-skip-forward">
                            <path d="M21 4v16" />
                            <path
                                d="M6.029 4.285A2 2 0 0 0 3 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z" />
                        </svg></div>
                </div>
                <div class="songTimeline">
                    <div class="currentTime time">2:03</div>
                    <div class="timelineSlider">
                        <div class="progressBar"></div>
                    </div>
                    <div class="totalTime time">2:54</div>
                </div>
            </div>
            <div class="musicFunctions">
                <div class="like m"></div>
                <div class="lyrics m"></div>
                <div class="volumeIcon m"></div>
                <div class="volumeSlider"></div>
                <div class="fullScreen m"></div>
            </div>
        </div>

    </section>
    <script src="home.js"></script>
</body>

</html>
